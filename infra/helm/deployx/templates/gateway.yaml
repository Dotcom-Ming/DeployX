apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ include "deployx.namespace" . }}
  labels:
    app: gateway
{{ include "deployx.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.images.gateway }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ include "deployx.namespace" . }}
  labels:
    app: gateway
{{ include "deployx.labels" . | indent 4 }}
spec:
  selector:
    app: gateway
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
