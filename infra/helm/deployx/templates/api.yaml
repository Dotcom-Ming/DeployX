apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ include "deployx.namespace" . }}
  labels:
    app: api
{{ include "deployx.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: {{ .Values.images.api }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ include "deployx.namespace" . }}
  labels:
    app: api
{{ include "deployx.labels" . | indent 4 }}
spec:
  selector:
    app: api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
