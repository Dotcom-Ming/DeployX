apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  namespace: deployx
  labels:
    app: billing
    app.kubernetes.io/name: billing
    app.kubernetes.io/part-of: deployx-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
        app.kubernetes.io/name: billing
    spec:
      containers:
        - name: billing
          image: deployx/billing:latest
          ports:
            - containerPort: 3003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: billing-config
            - secretRef:
                name: billing-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
