apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: deployx-ingress
  namespace: deployx
  labels:
    app: traefik
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: deployx-platform
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`app.deployx.io`)
      kind: Rule
      services:
        - name: web
          port: 3000
    - match: Host(`api.deployx.io`)
      kind: Rule
      services:
        - name: api
          port: 3001
    - match: Host(`admin.deployx.io`)
      kind: Rule
      services:
        - name: web
          port: 3000
  tls:
    certResolver: letsencrypt
    domains:
      - main: deployx.io
        sans:
          - app.deployx.io
          - api.deployx.io
          - admin.deployx.io
