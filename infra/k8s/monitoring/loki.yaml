apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: deployx
  labels:
    app: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.2.0
          args:
            - -config.file=/etc/loki/local-config.yaml
          ports:
            - containerPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: deployx
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
