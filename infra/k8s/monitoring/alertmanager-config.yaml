apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: deployx
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url: ${SLACK_WEBHOOK_URL}
    route:
      receiver: default-receiver
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
    receivers:
      - name: default-receiver
        slack_configs:
          - channel: '#deployx-alerts'
            send_resolved: true
        email_configs:
          - to: ops@deployx.io
            from: alertmanager@deployx.io
            smarthost: smtp.example.com:587
            auth_username: alertmanager
            auth_password: ${SMTP_PASSWORD}
