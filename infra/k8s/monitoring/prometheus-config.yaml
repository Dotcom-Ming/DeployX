apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: deployx
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      - job_name: deployx-api
        static_configs:
          - targets: ["api:3001"]
      - job_name: deployx-billing
        static_configs:
          - targets: ["billing:3003"]
      - job_name: deployx-builder
        static_configs:
          - targets: ["builder:3002"]
