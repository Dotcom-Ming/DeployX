apiVersion: apps/v1
kind: Deployment
metadata:
  name: builder
  namespace: deployx
  labels:
    app: builder
    app.kubernetes.io/name: builder
    app.kubernetes.io/part-of: deployx-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: builder
  template:
    metadata:
      labels:
        app: builder
        app.kubernetes.io/name: builder
    spec:
      containers:
        - name: builder
          image: deployx/builder:latest
          ports:
            - containerPort: 3002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: builder-config
            - secretRef:
                name: builder-secrets
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: build-workspace
              mountPath: /tmp/builds
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: build-workspace
          emptyDir:
            sizeLimit: 5Gi
      restartPolicy: Always
