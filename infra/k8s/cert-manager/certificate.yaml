apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: deployx-tls
  namespace: deployx
  labels:
    app.kubernetes.io/part-of: deployx-platform
spec:
  secretName: deployx-tls-secret
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer
  dnsNames:
    - deployx.io
    - app.deployx.io
    - api.deployx.io
    - admin.deployx.io
